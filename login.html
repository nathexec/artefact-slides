<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artefact · Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & variables ─────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:         #0A0A0F;
      --surface:    #111118;
      --surface2:   #16161f;
      --border:     rgba(255, 255, 255, 0.07);
      --border-focus: rgba(232, 36, 122, 0.5);
      --text:       #FFFFFF;
      --text-muted: rgba(255, 255, 255, 0.38);
      --text-sub:   rgba(255, 255, 255, 0.6);
      --accent:     #E8247A;
      --accent-dim: rgba(232, 36, 122, 0.12);
      --violet:     #7B2FFF;
      --blue:       #1E7BFF;
      --grad:       linear-gradient(135deg, #E8247A, #7B2FFF, #1E7BFF);
      --grad2:      linear-gradient(135deg, #FF4D9A, #A855F7);
      --radius:     14px;
      --radius-sm:  8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background decoration ─────────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(232, 36, 122, 0.10) 0%, transparent 65%);
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 55%;
      height: 55%;
      background: radial-gradient(ellipse, rgba(123, 47, 255, 0.10) 0%, transparent 65%);
    }

    /* ── Grid lines (subtle) ───────────────────────────────────────────── */
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ──────────────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0, 0, 0, 0.55),
        0 8px 24px rgba(0, 0, 0, 0.35);
    }

    /* ── Brand ─────────────────────────────────────────────────────────── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--grad);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── Heading ───────────────────────────────────────────────────────── */
    .heading {
      margin-bottom: 28px;
    }

    .heading h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .heading p {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 300;
      line-height: 1.5;
    }

    /* ── Form ──────────────────────────────────────────────────────────── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color 0.15s;
    }

    .input-icon svg {
      width: 15px;
      height: 15px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px 11px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(232, 36, 122, 0.08);
    }

    input[type="text"]:focus ~ .input-icon,
    input[type="password"]:focus ~ .input-icon {
      color: var(--accent);
    }

    .input-wrap:focus-within .input-icon {
      color: var(--accent);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .pw-toggle:hover {
      color: var(--text-sub);
    }

    .pw-toggle svg {
      width: 15px;
      height: 15px;
    }

    /* ── Error message ─────────────────────────────────────────────────── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(232, 36, 122, 0.08);
      border: 1px solid rgba(232, 36, 122, 0.22);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 13px;
      color: #ff6fa8;
    }

    .error-msg.visible {
      display: flex;
    }

    .error-msg svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Submit button ─────────────────────────────────────────────────── */
    .btn-submit {
      position: relative;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    }

    .btn-submit:hover:not(:disabled) {
      opacity: 0.88;
    }

    .btn-submit:active:not(:disabled) {
      transform: scale(0.99);
    }

    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-submit .btn-label { transition: opacity 0.15s; }
    .btn-submit .btn-spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }

    .btn-submit.loading .btn-label { opacity: 0; }
    .btn-submit.loading .btn-spinner { display: flex; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-ring {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Divider ───────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0 20px;
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .card-footer {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── Page footer ───────────────────────────────────────────────────── */
    .page-footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Background decorations -->
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>

  <div class="page">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <!-- Simple geometric logo mark -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Artefact</span>
          <span class="brand-sub">Slides</span>
        </div>
      </div>

      <!-- Heading -->
      <div class="heading">
        <h1>Welcome back</h1>
        <p>Sign in to access the presentation.</p>
      </div>

      <!-- Form -->
      <form class="form" id="loginForm" novalidate>

        <!-- Error -->
        <div class="error-msg" id="errorMsg" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errorText">Invalid username or password.</span>
        </div>

        <!-- Username -->
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              autocapitalize="none"
              spellcheck="false"
              required
            >
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-label">Sign in</span>
          <span class="btn-spinner"><span class="spinner-ring"></span></span>
        </button>

      </form>

      <div class="divider"></div>

      <p class="card-footer">
        Access is restricted to authorised users only.
      </p>

    </div>

    <p class="page-footer">ARTEFACT &nbsp;·&nbsp; CONFIDENTIAL</p>
  </div>

  <script>
    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const pwToggle  = document.getElementById('pwToggle');
    const pwInput   = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    // Password visibility toggle
    pwToggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? /* eye-off */
          '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : /* eye */
          '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // Hide error when user starts typing
    [document.getElementById('username'), pwInput].forEach(el => {
      el.addEventListener('input', () => {
        errorMsg.classList.remove('visible');
      });
    });

    // Form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = pwInput.value;

      if (!username || !password) {
        showError('Please enter your username and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Redirect to the app
          window.location.href = '/';
        } else {
          showError(data.message || 'Invalid username or password.');
        }
      } catch {
        showError('Unable to connect. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
    }
  </script>

</body>
</html>
